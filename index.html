<!DOCTYPE html>
<html lang="en">
<head>
    <title>Clicker Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="title">[placeholder]</div>
    <div class="titleSmall">[placeholder]</div>
    <p class = "titleSmall" id = "scoreDisplay">Score = 0</p>
    <div class="clickButton">
        <img id="clicker" src="" alt="clicker button" onclick="clickedButton()">
        <p id="scoreMulti">Current Multiplier: 0</p>
    </div>

    <div class="upgrades">

        <div id="upgrades">
            <p>[upgradename]</p>
            <img id="upgradeImg" src="" alt="upgrade1" onclick="upgrade1()">
            <p id="upgrade1">+1 per upgrade - $50</p>
            <p id="upgrade1amount"> 0 [upgradename] owned</p>
        </div>

        <div id="upgrades">
            <p>[upgradename]</p>
            <img id="upgradeImg" src="" alt="upgrade2">
            <p id="upgrade2">+5 per upgrade - $250</p>
            <p id="upgrade2amount"> 0 [upgradename] owned</p>
        </div>

        <div id="upgrades">
            <p>[upgradename]</p>
            <img id="upgradeImg" src="" alt="upgrade3">
            <p id="upgrade3">+20 per upgrade - $1000</p>
            <p id="upgrade3amount"> 0 [upgradename] owned</p>
        </div>

    </div>
    <script src="script.js"></script>
</body>
